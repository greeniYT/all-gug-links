<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="100%">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">

      <div class="header">
        <div class="header-left">
          <img src="https://cdn.jsdelivr.net/gh/greeniYT/gug@latest/assets/logo.png" class="xbox-logo" alt="Logo">
          <div class="nav-container">
            <button class="nav-item active" data-tab="home">home</button>
            <button class="nav-item" data-tab="games">games</button>
            <button class="nav-item" data-tab="apps">apps</button>
          </div>
        </div>
        <div class="header-right"></div>
      </div>

      <div class="content">

        <div id="homeTab" class="tab-content">
          <div class="dash-layout">

            <div class="dash-featured" id="dashFeatured">
              <div class="featured-inner">
                <div class="featured-art" id="featuredArt"></div>
                <div class="featured-meta" id="featuredMeta">
                  <div class="featured-label">Recently Played</div>
                  <div class="featured-title" id="featuredTitle">No recent game</div>
                  <div class="featured-action">▶ Resume</div>
                </div>
              </div>
            </div>

            <div class="dash-tiles">
              <div class="dash-tile coming-soon">
                <div class="tile-icon">📌</div>
                <div class="tile-label">My Pins</div>
                <div class="coming-soon-badge">Coming Soon</div>
              </div>
              <div class="dash-tile green large" onclick="switchTab('games')">
                <div class="tile-icon">🎮</div>
                <div class="tile-label">My Games</div>
              </div>
              <div class="dash-tile green" onclick="switchTab('apps')">
                <div class="tile-icon">⬛</div>
                <div class="tile-label">My Apps</div>
              </div>
              <div class="dash-tile coming-soon" id="recentTile">
                <div class="tile-icon">🕐</div>
                <div class="tile-label">Recent</div>
                <div class="coming-soon-badge">Coming Soon</div>
              </div>
            </div>

            <div class="dash-sidebar">
              <div class="sidebar-item coming-soon-sidebar">
                <span>Friends</span>
                <span class="sidebar-soon">Soon</span>
              </div>
              <div class="sidebar-item coming-soon-sidebar">
                <span>Activity Feed</span>
                <span class="sidebar-soon">Soon</span>
              </div>
              <div class="sidebar-item coming-soon-sidebar">
                <span>Messages</span>
                <span class="sidebar-soon">Soon</span>
              </div>
              <div class="sidebar-item coming-soon-sidebar">
                <span>Sign In</span>
                <span class="sidebar-soon">Soon</span>
              </div>
            </div>

          </div>

          <div class="home-recent-section">
            <div class="section-title" style="font-size: 18px; margin-bottom: 12px;">Recent Activity</div>
            <div class="recent-row" id="recentRow"></div>
          </div>
        </div>

        <div id="gamesTab" class="tab-content" style="display: none;">
          <div class="games-header">
            <div class="games-title-area">
              <div class="section-title">My Games</div>
              <div class="games-count" id="gameCount">Loading...</div>
            </div>
          </div>
          <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="Search games...">
          </div>
          <div id="gamesContent">
            <div class="loading">
              <div class="spinner"></div>
              <span>Loading games...</span>
            </div>
          </div>
        </div>

        <div id="appsTab" class="tab-content" style="display: none;">
          <div class="games-header">
            <div class="games-title-area">
              <div class="section-title">My Apps</div>
              <div class="games-count" id="appCount">Loading...</div>
            </div>
          </div>
          <div class="search-bar">
            <input type="text" id="appSearchInput" class="search-input" placeholder="Search apps...">
          </div>
          <div id="appsContent">
            <div class="loading">
              <div class="spinner"></div>
              <span>Loading apps...</span>
            </div>
          </div>
        </div>

      </div>

      <div class="game-overlay" id="gameOverlay">
        <div class="top-hotspot" id="topHotspot"></div>
        <div class="dropdown-btn" id="dropdownBtn"></div>
        <div class="panel-backdrop" id="panelBackdrop"></div>

        <div class="side-panel" id="sidePanel">
          <div class="side-panel-header">
            <div class="side-panel-title">Menu</div>
            <div class="side-panel-close" id="sidePanelClose">✕</div>
          </div>
          <div class="side-panel-options">
            <div class="side-option" id="newTabBtn">
              <span class="side-option-icon">↗</span>
              <span>Open in New Tab</span>
            </div>
            <div class="side-option" id="fullscreenBtn">
              <span class="side-option-icon">⛶</span>
              <span>Fullscreen</span>
            </div>
            <div class="side-option close-game" id="closeGameBtn">
              <span class="side-option-icon">✕</span>
              <span>Close Game</span>
            </div>
          </div>
        </div>

        <div class="game-content" id="gameContent"></div>
      </div>

      <link rel="stylesheet" href="style.css"/>
      <script src="app.js"></script>

    </div>
  </foreignObject>
</svg>
